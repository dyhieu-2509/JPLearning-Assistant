server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: jplearning-assistant-backend
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/jpassistant}
    username: ${POSTGRES_USER:jpassistant}
    password: ${POSTGRES_PASSWORD:jpassistant123}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    open-in-view: false
  neo4j:
    uri: ${SPRING_NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${NEO4J_USER:neo4j}
      password: ${NEO4J_PASSWORD:neo4jpassword}
  data:
    neo4j:
      repositories:
        enabled: false

jpassistant:
  auth:
    jwt-secret: ${JWT_SECRET:dev-secret-change-me-32-bytes-minimum-for-hs256}
    access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:30m}
    refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:14d}
    frontend-redirect-url: ${FRONTEND_AUTH_REDIRECT_URL:http://localhost:3000/auth/callback}
  ai-service:
    base-url: ${AI_SERVICE_URL:http://localhost:8000}
    timeout: ${AI_SERVICE_TIMEOUT:12s}

springdoc:
  swagger-ui:
    path: /swagger-ui.html
