spring:
  datasource:
    url: jdbc:h2:mem:jpassistant;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: neo4j
      password: neo4jpassword

jpassistant:
  auth:
    jwt-secret: test-secret-change-me-32-bytes-minimum-for-hs256
    access-token-ttl: 30m
    refresh-token-ttl: 14d
    frontend-redirect-url: http://localhost:3000/auth/callback
  ai-service:
    base-url: http://localhost:8000
    timeout: 1s

debug: false

logging:
  level:
    root: WARN
    com.jpassistant: INFO
    org.hibernate.SQL: WARN
    org.springframework: WARN
