services:
  backend:
    build:
      context: ./backend
    container_name: jpassistant-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-jpassistant}
      POSTGRES_USER: ${POSTGRES_USER:-jpassistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jpassistant123}
      SPRING_NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      - postgres
      - neo4j
      - ai-service
    restart: unless-stopped

  ai-service:
    build:
      context: ./ai-service
    container_name: jpassistant-ai-service
    expose:
      - "8000"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-neo4jpassword}
      QDRANT_URL: http://qdrant:6333
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-jp_learning_knowledge}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      EMBEDDING_VECTOR_SIZE: ${EMBEDDING_VECTOR_SIZE:-1024}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-bge-m3}
      OLLAMA_TIMEOUT_SECONDS: ${OLLAMA_TIMEOUT_SECONDS:-120}
      LLM_PROVIDER: ${LLM_PROVIDER:-mock}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    depends_on:
      - neo4j
      - qdrant
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: jpassistant-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jpassistant}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jpassistant123}
      POSTGRES_DB: ${POSTGRES_DB:-jpassistant}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  neo4j:
    image: neo4j:5-community
    container_name: jpassistant-neo4j
    ports:
      - "7474:7474" # Browser interface
      - "7687:7687" # Bolt connection
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-neo4jpassword}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    container_name: jpassistant-qdrant
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  qdrant_data:
