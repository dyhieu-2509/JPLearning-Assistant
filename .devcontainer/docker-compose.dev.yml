services:
  devcontainer:
    image: mcr.microsoft.com/devcontainers/base:ubuntu
    container_name: jpassistant-dev
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    depends_on:
      - postgres
      - neo4j
      - qdrant
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
